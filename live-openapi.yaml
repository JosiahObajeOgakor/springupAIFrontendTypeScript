  /api/v1/ebook/list:
    get:
      summary: List available ebooks
      security: [{ BearerAuth: [] }]
      responses:
        '200': { description: Ebook catalog }

  /api/v1/ebook/purchase:
    post:
      summary: Purchase ebook (digital)
      security: [{ BearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ebook_id: { type: string }
      responses:
        '200': { description: Purchase complete with reader link }

  /api/v1/ebook/hard-copy/purchase:
    post:
      summary: Purchase hard copy (escrow-backed delivery)
      description: |
        Payment held in escrow. Vendor ships within timeframe.
        Auto-released 48h after delivery confirmation.
      security: [{ BearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ebook_id: { type: string }
                delivery_address: { type: string }
                delivery_phone: { type: string }
      responses:
        '200': { description: Order created with escrow }

  /api/v1/ebook/hard-copy/status/{order_id}:
    get:
      summary: Check hard copy delivery status
      security: [{ BearerAuth: [] }]
      parameters:
        - name: order_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Delivery status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [pending, shipped, delivered, confirmed] }
                  tracking_number: { type: string }

  /api/v1/ebook/hard-copy/confirm:
    post:
      summary: Buyer confirms delivery received
      security: [{ BearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                order_id: { type: string }
      responses:
        '200': { description: Delivery confirmed, escrow released to vendor }

  /api/v1/ebook/advance/request:
    post:
      summary: "[Vendor] Request advance on pending escrow (max 40%)"
      security: [{ BearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                order_id: { type: string }
                amount: { type: integer, description: "Amount in kobo (max 40% of escrow)" }
                reason: { type: string }
      responses:
        '200': { description: Advance request submitted for review (3 working days) }

  /api/v1/ebook/advance/review:
    post:
      summary: "[Admin] Approve or reject vendor advance request"
      security: [{ BearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                request_id: { type: string }
                decision: { type: string, enum: [approve, reject] }
                reason: { type: string }
      responses:
        '200': { description: Decision recorded }

