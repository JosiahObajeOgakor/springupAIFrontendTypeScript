openapi: 3.0.3
info:
  title: SpringupAI Gateway API
  version: 2.0.0
  description: |
    Full API reference for SpringupAI. All protected routes require `Authorization: Bearer <jwt>`.
    Obtain a token via `/api/v1/user/register`, `/api/v1/auth/login`, or `/api/v1/vendor/login`.
servers:
  - url: https://api.springupai.com
    description: Production
  - url: http://localhost:8080
    description: Local

security: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        error: { type: string }
    Token:
      type: object
      properties:
        token: { type: string }
    User:
      type: object
      properties:
        id: { type: string }
        phone: { type: string }
        name: { type: string }
        language: { type: string }
        location: { type: string }
        role: { type: string }
    Vendor:
      type: object
      properties:
        id: { type: string }
        phone: { type: string }
        name: { type: string }
        category: { type: string }
        location: { type: string }
        kyc_status: { type: string }
        tier: { type: string }
    Service:
      type: object
      properties:
        id: { type: string }
        vendor_id: { type: string }
        title: { type: string }
        description: { type: string }
        price_kobo: { type: integer }
        category: { type: string }
        location: { type: string }

tags:
  - name: Auth
    description: Registration, login, token lifecycle
  - name: User
    description: User profile management
  - name: Vendor
    description: Vendor registration, profile, KYC, services
  - name: Marketplace
    description: Service discovery and job lifecycle
  - name: Wallet
    description: Wallet funding, transfers, escrow
  - name: Escrow
    description: Escrow open/fund/confirm/dispute lifecycle
  - name: Payments
    description: Payment intents and webhooks
  - name: Payout
    description: Vendor payout requests and admin approval
  - name: Mediation
    description: Dispute mediation conversations
  - name: Bills
    description: Airtime, flights, utility bills (Remita)
  - name: Radio
    description: Audio streaming and track management
  - name: Ebook
    description: Ebook upload, purchase, hard-copy delivery
  - name: Admin
    description: Admin dashboard, reports, and management
  - name: Webhooks
    description: Inbound webhooks from payment providers and WhatsApp

paths:
  /api/v1/user/register:
    post:
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string }
                name: { type: string }
                language: { type: string }
                location: { type: string }
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  user:
                    type: object
                    properties:
                      id: { type: string }
                      phone: { type: string }
                      name: { type: string }
                      language: { type: string }
                      location: { type: string }
        '409':
          description: phone already registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string, example: "phone already registered" }
  /api/v1/vendor/register-by-phone:
    post:
      summary: Register vendor by phone (creates + links a user) Гўв‚¬вЂќ RECOMMENDED
      description: |
        Registers a vendor AND creates/links the underlying user record by phone in a
        single call. Use this for vendor sign-up: it is the only register path that
        creates a user, which is required for `/api/v1/vendor/login` to work afterwards.
        Returns `409` if the phone is already registered as a user or vendor.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
                - name
                - category
              properties:
                phone: { type: string, description: Vendor's phone number (required, unique) }
                name: { type: string }
                category: { type: string }
                location: { type: string }
                area: { type: string }
                lat: { type: number }
                lng: { type: number }
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string, description: Vendor JWT (carries the real user_id) }
                  vendor:
                    type: object
                    properties:
                      id: { type: string }
                      user_id: { type: string }
                      phone: { type: string }
                      name: { type: string }
                      category: { type: string }
                      location: { type: string }
                      verified: { type: boolean }
                      kyc_status: { type: string }
                  user:
                    type: object
                    properties:
                      id: { type: string }
                      name: { type: string }
                      phone: { type: string }
        '409':
          description: phone already registered as a user or vendor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
  /api/v1/vendor/register:
    post:
      summary: Register vendor (phone-based, NO user created)
      description: |
        Register a vendor row using phone, name, category, and location. NOTE: unless a
        valid `user_id` is supplied, this does NOT create a user record Гўв‚¬вЂќ so vendors
        registered here CANNOT log in via `/api/v1/vendor/login` (which requires a user).
        For vendor sign-up prefer `/api/v1/vendor/register-by-phone`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
                - name
                - category
                - location
              properties:
                phone:
                  type: string
                  description: Vendor's phone number (required, must be unique)
                name:
                  type: string
                  description: Vendor's name
                category:
                  type: string
                  description: Vendor's category
                location:
                  type: string
                  description: Vendor's location
                user_id:
                  type: string
                  description: (Optional) Existing user ID. If omitted, user will be created by phone.
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: Vendor JWT token
                  vendor:
                    type: object
                    properties:
                      id: { type: string }
                      user_id: { type: string }
                      name: { type: string }
                      category: { type: string }
                      location: { type: string }
                      verified: { type: boolean }
                      kyc_status: { type: string }
                  user_id:
                    type: string
                    description: User ID associated with vendor
                  vendor_unique:
                    type: string
                    description: Unique identifier for vendor (usually phone)
        '409':
          description: vendor already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
  /api/v1/vendor/login:
    post:
      summary: Vendor login by phone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
              properties:
                phone: { type: string }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  vendor_id: { type: string }
                  user:
                    type: object
                    properties:
                      id: { type: string }
                      name: { type: string }
                      phone: { type: string }
  /api/v1/admin/login:
    post:
      summary: Admin login (returns a 12h admin JWT)
      description: >
        Authenticate with the admin API key to receive an admin JWT. Send the key
        under "secret" (aliases also accepted: api_key, apiKey, key) or the
        X-Admin-Key header. The value must be the configured ADMIN_API_KEY
        (e.g. "dev-admin-key" locally) Гўв‚¬вЂќ not the literal string "ADMIN_API_KEY".
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - secret
              properties:
                secret:
                  type: string
                  description: Admin API key value (the ADMIN_API_KEY secret)
                  example: dev-admin-key
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
        '401':
          description: unauthorized (missing or wrong admin key)
  /api/v1/radio/upload/presign:
    post:
      summary: Get a presigned S3 URL to upload a track directly (admin)
      security: [ { BearerAuth: [] } ]
      description: >
        Returns a presigned PUT URL so the browser uploads the audio file straight
        to S3 (no proxying Гўв‚¬вЂќ far faster). Measure progress client-side from the PUT
        (XHR/fetch upload progress vs file_size_bytes). After the PUT succeeds, call
        /radio/upload/complete with the track_id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file_name]
              properties:
                file_name: { type: string, example: song.mp3 }
                content_type: { type: string, example: audio/mpeg }
                title: { type: string }
                artist: { type: string }
                genre: { type: string }
                mood: { type: string }
                energy: { type: string }
                content_rating: { type: string }
                tags: { type: string }
                tenant_id: { type: string }
                admin_id: { type: string }
                file_size_bytes: { type: integer, description: used for progress UI }
                duration_secs: { type: integer }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  track_id: { type: string }
                  put_url: { type: string, description: PUT the file here directly }
                  file_key: { type: string }
                  content_type: { type: string }
                  expires_in_secs: { type: integer }
                  file_size_bytes: { type: integer }
                  upload_method: { type: string, example: PUT }
  /api/v1/radio/upload/presign/batch:
    post:
      summary: Presigned URLs for many tracks at once (admin)
      security: [ { BearerAuth: [] } ]
      description: >
        Returns a presigned PUT URL per file plus requested/ready counts and
        total_bytes, so the frontend uploads in parallel and shows an aggregate
        "N of M / X MB" progress bar.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, description: batch name }
                admin_id: { type: string }
                files:
                  type: array
                  items:
                    type: object
                    properties:
                      file_name: { type: string }
                      content_type: { type: string }
                      title: { type: string }
                      artist: { type: string }
                      genre: { type: string }
                      mood: { type: string }
                      file_size_bytes: { type: integer }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  batch_id: { type: string }
                  requested: { type: integer }
                  ready: { type: integer }
                  total_bytes: { type: integer }
                  upload_method: { type: string, example: PUT }
                  tracks:
                    type: array
                    items:
                      type: object
                      properties:
                        track_id: { type: string }
                        put_url: { type: string }
                        file_key: { type: string }
                        file_name: { type: string }
                        content_type: { type: string }
                        expires_in_secs: { type: integer }
                        file_size_bytes: { type: integer }
  /api/v1/radio/upload/complete:
    post:
      summary: Activate a track after its direct-to-S3 upload (admin)
      security: [ { BearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [track_id]
              properties:
                track_id: { type: string }
                duration_secs: { type: integer }
                file_size_bytes: { type: integer }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  track_id: { type: string }
                  status: { type: string, example: active }
  /api/v1/vendor/kyc/presign:
    post:
      summary: Presigned PUT URL for uploading a KYC ID image (vendor)
      security: [ { BearerAuth: [] } ]
      description: >
        Returns a short-lived presigned S3 PUT URL the client uploads the ID image
        straight to (no byte-proxying). Resize to 512x512 and encode JPEG/WebP before
        the PUT Гўв‚¬вЂќ the converted file is stored, not the raw image. Locally the URL is
        signed against S3_PUBLIC_ENDPOINT (browser-reachable host) so the SigV4
        signature matches the request. NOTE: the gateway reads vendor_id and type
        from the JSON body (query params are ignored on this route).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - vendor_id
                - type
              properties:
                vendor_id: { type: string }
                type: { type: string, example: national_id }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  put_url: { type: string, description: Presigned S3 PUT URL (expires in ~15 min) }
                  key: { type: string, example: "kyc/<vendor_id>/national_id" }
                  expires_in_secs: { type: string, example: "900" }
                  recommended: { type: string }
  /api/v1/vendor/kyc/submit:
    post:
      summary: Submit KYC (NIN/BVN) and initiate the verification payment (vendor)
      security: [ { BearerAuth: [] } ]
      description: >
        Submits the vendor's KYC identifiers and starts the ГўвЂљВ¦5,000 verification
        payment via Paystack. Returns immediately with status `payment_pending`
        (`paystack_status: simulated` when PAYSTACK_DEMO_MODE=true); the vendor is
        only marked verified later, after the Paystack webhook confirms the charge.
        Provide at least one of `nin` or `bvn`. Upload the ID image first via
        /vendor/kyc/presign.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - vendor_id
              properties:
                vendor_id: { type: string }
                nin: { type: string, description: National ID number (nin or bvn required) }
                bvn: { type: string, description: Bank Verification Number (nin or bvn required) }
                method: { type: string, example: nin }
                selfie_url: { type: string }
                doc_front_url: { type: string }
                doc_back_url: { type: string }
                email: { type: string, description: Optional; derived from vendor phone if omitted }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  vendor_id: { type: string }
                  nin: { type: string }
                  bvn: { type: string }
                  method: { type: string }
                  paystack_ref: { type: string }
                  paystack_status: { type: string, example: simulated }
                  status: { type: string, example: payment_pending }
                  updated_at: { type: string, format: date-time }
        '400':
          description: vendor_id required, or nin/bvn missing
        '502':
          description: KYC service unreachable or payment init failed
  /api/v1/vendor/kyc/status:
    get:
      summary: Get KYC status for a vendor (vendor/admin)
      security: [ { BearerAuth: [] } ]
      description: >
        Returns the current KYC record/status for a vendor. If `vendorId` is omitted,
        it is resolved from the authenticated vendor's user id.
      parameters:
        - in: query
          name: vendorId
          required: false
          schema: { type: string }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  vendor_id: { type: string }
                  status: { type: string, example: payment_pending }
                  paystack_status: { type: string }
                  method: { type: string }
        '400':
          description: vendorId required (could not be resolved)
  /api/v1/vendor/kyc/document:
    get:
      summary: Presigned GET URL for a stored KYC ID image (vendor/admin)
      security: [ { BearerAuth: [] } ]
      description: >
        Returns a short-lived presigned GET URL for the frontend-converted 512x512
        ID image stored in S3. The upload side uses /vendor/kyc/presign Гўв‚¬вЂќ the client
        resizes to 512x512 and encodes JPEG/WebP before the direct PUT (we store the
        converted file, not raw).
      parameters:
        - in: query
          name: vendor_id
          required: true
          schema: { type: string }
        - in: query
          name: type
          required: true
          schema: { type: string, example: nin }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  get_url: { type: string }
                  key: { type: string }
  /api/v1/vendor/services:
    get:
      summary: List vendor services
      security: [ { BearerAuth: [] } ]
      parameters:
        - in: query
          name: vendorId
          schema: { type: string }
          required: true
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    vendor_id: { type: string }
                    title: { type: string }
                    description: { type: string }
                    price: { type: integer }
                    available: { type: boolean }
  /api/v1/vendor/services/create:
    post:
      summary: Create vendor service
      description: Requires verified KYC and an active paid vendor tier.
      security: [ { BearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                vendor_id: { type: string }
                title: { type: string }
                description: { type: string }
                price: { type: integer }
                available: { type: boolean }
      responses:
        '201':
          description: created
        '500':
          description: vendor is not KYC verified or has no active paid tier
  /api/v1/vendor/tier/apply:
    post:
      summary: Apply for a paid vendor tier
      description: >
        Initializes a Paystack transaction for the vendor tier application and returns
        the Paystack public key so the FRONTEND completes payment (Paystack Inline) Гўв‚¬вЂќ
        the backend does not call Paystack directly. Requires completed KYC. A
        successful Paystack webhook (/api/v1/payments/webhook/paystack) activates the
        tier automatically. Tiers lift the service-listing cap: gold = 3, silver = 5,
        platinum = unlimited. A verified vendor with NO active tier (free plan) may
        create 1 service listing; creating a 2nd returns an upgrade error.
        tier_level accepts gold/silver/platinum or tier_1/tier_2/tier_3.
      security: [ { BearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - vendor_id
                - tier_level
              properties:
                vendor_id: { type: string }
                tier_level:
                  type: string
                  enum: [tier_1, tier_2, tier_3]
                email: { type: string, format: email }
                callback_url: { type: string, format: uri }
      responses:
        '201':
          description: payment initialized
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment_id: { type: string }
                  owner_id: { type: string }
                  purpose: { type: string }
                  amount: { type: integer, description: Amount in kobo }
                  currency: { type: string }
                  provider: { type: string }
                  client_reference: { type: string }
                  provider_reference: { type: string }
                  authorization_url: { type: string, format: uri }
                  access_code: { type: string }
                  status: { type: string, example: pending }
                  paystack_public_key: { type: string }
                  tier_level: { type: string }
        '400':
          description: invalid request or vendor not yet KYC verified
  /api/v1/vendor/kyc/activate:
    post:
      deprecated: true
      summary: Legacy vendor KYC initiation route
      security: [ { BearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id: { type: string }
                vendor_id: { type: string }
                location: { type: string }
      responses:
        '200':
          description: vendor must complete submit-and-pay KYC flow
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: kyc_submission_required }
                  vendor_id: { type: string }
                  deprecated: { type: boolean }
                  next_step: { type: string, example: /api/v1/vendor/kyc/submit }
                  description: { type: string }
  /api/v1/vendor/plan/check:
    get:
      summary: Check vendor tier status
      security: [ { BearerAuth: [] } ]
      parameters:
        - in: query
          name: vendorId
          schema: { type: string }
          required: true
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  active: { type: boolean }
                  plan: { type: string }
                  tier_status: { type: string }
                  expires_at: { type: string, format: date-time }
  /api/v1/bills/remita/catalog:
    get:
      summary: Get Remita VAS service list and commissions
      description: Signed-in users and vendors can browse the supported Remita VAS, vending, and commission catalog.
      security: [ { BearerAuth: [] } ]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  provider: { type: string, example: remita }
                  source: { type: string, example: embedded }
                  remote_configured: { type: boolean }
                  services:
                    type: array
                    items:
                      type: object
                      properties:
                        category: { type: string }
                        biller_name: { type: string }
                        commission: { type: string }
                        commission_type: { type: string }
                        commission_value: { type: number }
                        commission_unit: { type: string }
                        provider: { type: string }
                        supports_vending: { type: boolean }
                        requires_amount: { type: boolean }
                        requires_customer_reference: { type: boolean }
  /api/v1/bills/remita/categories:
    get:
      summary: Get Remita vending categories
      description: Proxies the Remita Connect categories endpoint. In local development, configure REMITA_BASE_URL to the dev Connect base URL and this route will call /api/v1/vending/categories with page and size query params.
      security: [ { BearerAuth: [] } ]
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 0 }
        - in: query
          name: size
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: Approved or completed successfully }
                  status: { type: string, example: '00' }
                  data:
                    type: object
                    properties:
                      totalPage: { type: integer, example: 1 }
                      totalContent: { type: integer, example: 6 }
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: integer, example: 1 }
                            name: { type: string, example: electricity }
                            description: { type: string, example: electricity }
                            code: { type: string, example: electricity }
        '502':
          description: Remita categories fetch failed or service unavailable
  /api/v1/bills/remita/vend:
    post:
      summary: Vend a Remita service for a signed-in user or vendor
      description: Debits the caller wallet and forwards the request to the configured Remita vending endpoint.
      security: [ { BearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - biller_name
                - customer_reference
                - amount
              properties:
                owner_id: { type: string, description: Optional. Defaults to authenticated user id. }
                category: { type: string }
                biller_name: { type: string }
                service_type_id: { type: string }
                product_code: { type: string }
                customer_reference: { type: string }
                phone: { type: string }
                email: { type: string, format: email }
                amount: { type: integer, description: Amount in kobo/minor unit as used by the wallet service. }
                currency: { type: string, example: NGN }
                narration: { type: string }
      responses:
        '200':
          description: vend success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  provider: { type: string }
                  reference: { type: string }
                  message: { type: string }
                  payload: { type: object }
        '502':
          description: Remita vend failed or service unavailable
  /api/v1/kyc/webhook/paystack:
    post:
      summary: Receive Paystack webhook for vendor KYC payments
      description: Public webhook endpoint proxied to the KYC service.
      requestBody:
