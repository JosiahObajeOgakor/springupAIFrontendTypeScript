  /api/v1/embed/radio/preload:
    get:
      summary: "[3rd-Party] Get radio preload manifest via API key"
      description: |
        For external platforms embedding SpringUp Radio.
        Requires X-Embed-Key header (issued by admin).
      parameters:
        - name: X-Embed-Key
          in: header
          required: true
          schema: { type: string }
        - name: listener_id
          in: query
          required: true
          schema: { type: string, description: "Unique listener identifier from your platform" }
      responses:
        '200': { description: Preload manifest with signed URLs }
        '401': { description: Missing embed key }
        '403': { description: Invalid embed key }

  /api/v1/embed/radio/stream/{track_id}:
    get:
      summary: "[3rd-Party] Stream track via API key"
      parameters:
        - name: X-Embed-Key
          in: header
          required: true
          schema: { type: string }
        - name: track_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Audio stream }
        '302': { description: CDN redirect }

  /api/v1/admin/embed-key/create:
    post:
      summary: "[Admin] Create API key for 3rd-party platform"
      security: [{ BearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                tenant_name: { type: string, example: "BlogPlatformXYZ" }
                domain: { type: string, example: "https://blogxyz.com" }
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  embed_key: { type: string }
                  tenant_name: { type: string }
                  usage: { type: string }

  /api/v1/admin/embed-key/revoke:
    post:
      summary: "[Admin] Revoke 3rd-party API key"
      security: [{ BearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                embed_key: { type: string }
      responses:
        '200': { description: Key revoked }


