  # Radio Гўв‚¬вЂќ Audio Streaming
  # ГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђ

  /api/v1/radio/preload:
    get:
      summary: Get preload manifest (10 shuffled tracks with CDN URLs)
      description: |
        Returns 10 shuffled tracks for offline buffering. Client should preload all URLs.
        At track 8 (next_check_at), call /radio/check before continuing.
        If user is blocked (24h cooldown), returns 403 with blocked_until timestamp.
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Preload manifest
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id: { type: string }
                  next_check_at: { type: integer, example: 8 }
                  tracks:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        title: { type: string }
                        artist: { type: string }
                        duration_secs: { type: integer }
                        stream_url: { type: string, description: "Signed CloudFront URL or /radio/stream/{id} fallback" }
                        index: { type: integer }
        '403':
          description: User blocked (24h cooldown Гўв‚¬вЂќ no purchase detected)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string, example: "come_back_later" }
                  message: { type: string }
                  blocked_until: { type: string, format: date-time }

  /api/v1/radio/stream/{track_id}:
    get:
      summary: Stream audio track (byte-stream or CDN redirect)
      description: |
        Returns 302 redirect to a presigned S3 GET URL (browser follows automatically).
        In local dev redirects to localhost:9000 (MinIO); in production to CloudFront or S3.
        Supports Range headers for byte-range requests. Requires a preload session.
      security: [{ BearerAuth: [] }]
      parameters:
        - name: track_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Audio byte stream
          content:
            audio/mpeg: { schema: { type: string, format: binary } }
        '302': { description: Redirect to CloudFront signed URL }
        '404': { description: Track not found }

  /api/v1/radio/check:
    post:
      summary: Purchase gate check (call at track 8 or playlist end)
      description: |
        Verifies user has made a purchase from any tenant in last 24h.
        If yes: returns "continue" action with next 10-track manifest.
        If no: blocks user for 24 hours, returns "stop" action.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id: { type: string }
      responses:
        '200':
          description: Continue playing
          content:
            application/json:
              schema:
                type: object
                properties:
                  action: { type: string, enum: [continue] }
                  manifest: { type: object }
        '403':
          description: Blocked Гўв‚¬вЂќ no purchase
          content:
            application/json:
              schema:
                type: object
                properties:
                  action: { type: string, enum: [stop] }
                  message: { type: string }
                  blocked: { type: boolean }

  /api/v1/radio/upload:
    post:
      summary: "[Admin] Upload single audio track (mp3/wav)"
      description: Multipart upload. Max 50MB. Only mp3 and wav accepted.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
                title: { type: string }
                artist: { type: string }
                genre: { type: string }
                album: { type: string }
                mood: { type: string }
                admin_id: { type: string }
      responses:
        '201':
          description: Track uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  track_id: { type: string }
                  title: { type: string }
                  artist: { type: string }
                  genre: { type: string }
                  status: { type: string, example: "uploaded" }

  /api/v1/radio/upload/batch:
    post:
      summary: "[Admin] Upload up to 10 tracks at once"
      description: Multipart batch upload. Max 200MB total. Provide files[] array.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files: { type: array, items: { type: string, format: binary } }
                name: { type: string, description: "Batch name" }
                admin_id: { type: string }
                title_0: { type: string }
                artist_0: { type: string }
      responses:
        '201':
          description: Batch results
          content:
            application/json:
              schema:
                type: object
                properties:
                  batch_id: { type: string }
                  results: { type: array, items: { type: object } }

  /api/v1/radio/tracks:
    get:
      summary: "[Admin] List all tracks"
      security: [{ BearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: Track list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    title: { type: string }
                    artist: { type: string }
                    file_type: { type: string }
                    play_count: { type: integer }
                    is_active: { type: boolean }

